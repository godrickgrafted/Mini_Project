{% extends "base.html" %}

{% block pageheading %}Create session{% endblock %}

{% block main %}
<form class="myform" method="post">

    <div class="form-group">
        <div class="form-label">Title:</div>
        <div class="form-element"><input type="text" name="title" required></div>
    </div>

    <div class="form-group">
        <div class="form-label">Description:</div>
        <div class="form-element"><input type="text" name="description" required></div>
    </div>

    <div class="form-group">
        <div class="form-label">Date:</div>
        <div class="form-element"><input type="date" name="session_date" required></div>
    </div>

    <div class="form-group">
        <div class="form-label">Time:</div>
        <div class="form-element"><input type="time" name="session_time" required></div>
    </div>

    <div class="form-group">
        <div class="form-label">Location:</div>
        <div class="form-element"><input type="text" name="location" required></div>
    </div>

    <div class="form-group">
        <div class="form-label">Subject:</div>
        <div class="form-element">
            <select name="subject_id" required>
                {% for subject in list_of_subjects %}
                    <option value="{{ subject[0] }}">{{ subject[1] }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <div class="form-label"></div>
        <div class="form-element"><input type="submit" value="Create session"></div>
    </div>

</form>
{% endblock %}
